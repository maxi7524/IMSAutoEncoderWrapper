name: ims_env
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # --- PYTHON CORE ---
  - python=3.12
  - pip
  - ipykernel
  - uv

  # --- DATA HANDLING ---
  - pandas
  - numpy
  - polars
  - tabulate

  # --- MATH & STATS ---
  - scipy
  - statsmodels
  - scikit-learn

  # --- MACHINE LEARNING ---
  # TODO pytorch library
  # - pytorch
  # - torchvision
  # - torchaudio

  # --- VISUALIZATION ---
  - matplotlib
  - seaborn
  - ipywidgets

  # --- PIP DEPENDENCIES ---
  - pip:
      - m2aia
      - pyimzml